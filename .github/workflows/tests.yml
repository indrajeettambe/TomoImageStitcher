name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpu:
    name: CPU tests (no GPU)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (CPU only)
        run: |
          python -m pip install --upgrade pip
          # Skip the cupy-cuda12x default dep on CI; we only run the CPU tests.
          python -m pip install -e .[dev] --no-deps
          python -m pip install numpy scipy scikit-learn h5py tifffile \
              imagecodecs SimpleITK scikit-image matplotlib tqdm
      - name: Lint
        run: |
          python -m pip install flake8
          # E501: line too long, W503: line break before operator
          flake8 src/ tests/ --max-line-length=100 --extend-ignore=E501,W503
      - name: Run CPU tests
        run: |
          python -m pip install pytest pytest-cov
          pytest tests/test_utilities.py -v --cov=tomo_image_stitcher --cov-report=term-missing

  gpu:
    name: GPU tests
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Locate pre-installed Python
        # Self-hosted runners must bring their own Python. The conda env at
        # /home/indrajeettambe/miniconda3 provides Python 3.12 on this box;
        # override $CONDA_PREFIX in a wrapper if you move it.
        id: py
        run: |
          for cand in /home/indrajeettambe/miniconda3/bin/python3.12 \
                      /opt/conda/bin/python3.12 \
                      /usr/local/bin/python3.12 \
                      /usr/bin/python3.12; do
            if [ -x "$cand" ]; then
              echo "python=$cand" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::No Python 3.12 found in standard locations" >&2
          exit 1
      - name: Verify CUDA device is visible
        run: |
          nvidia-smi
          test -n "$(nvidia-smi -L)" || (echo "::error::No GPU visible to the runner"; exit 1)
      - name: Install package with GPU support
        run: |
          "${{ steps.py.outputs.python }}" -m pip install --upgrade pip
          "${{ steps.py.outputs.python }}" -m pip install cupy-cuda12x
          "${{ steps.py.outputs.python }}" -m pip install -e .[dev]
      - name: Run GPU tests
        run: |
          "${{ steps.py.outputs.python }}" -m pytest tests/ -v -m gpu \
              --cov=tomo_image_stitcher --cov-report=term-missing
